<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#DC7553">
  <title>HUXI</title>
  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json">
  <!-- iOS fallback -->
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="apple-mobile-web-app-title" content="HUXI">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="root"></div>
  <!-- Firebase SDK (compat) — voor FCM push notificaties -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js"></script>
  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- App bestanden -->
  <script src="config.js?v=3"></script>
  <script src="data.js?v=3"></script>
  <script src="helpers.js?v=3"></script>
  <script src="world.js?v=3"></script>
  <script src="app.js?v=3"></script>
  <!-- App starten -->
  <script>
    ReactDOM.createRoot(document.getElementById('root')).render(
      React.createElement(HuxiApp)
    );
    // Service Worker registreren (PWA + FCM)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/huxi-app/sw.js')
        .then(reg => console.log('[SW] Geregistreerd:', reg.scope))
        .catch(e => console.warn('[SW] Fout:', e));
    }
  </script>
</body>
</html>
